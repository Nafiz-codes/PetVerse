<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PetVerse — Animal Adoption Platform</title>
  <meta name="description" content="Find your perfect pet companion or help animals find loving homes on PetVerse." />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<div class="auth-page">
  <div class="auth-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-icon">🐾</span>
      <h1>PetVerse</h1>
      <p>Sign in to your account</p>
    </div>

    <div id="loginAlert" class="alert alert-error"></div>

    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <label for="loginEmail">Email Address</label>
        <input id="loginEmail" type="email" class="form-control" placeholder="you@example.com" required />
      </div>

      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input id="loginPassword" type="password" class="form-control" placeholder="••••••••" required />
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
        Sign In
      </button>
    </form>

    <div class="auth-link">
      Don't have an account? <a href="/register.html">Create one →</a>
    </div>

    <div class="divider"></div>

    <div style="text-align:center; font-size:0.78rem; color:var(--text-muted);">
      <strong style="color:var(--text-secondary);">Demo accounts</strong><br/>
      Admin: admin@adopt.com / admin123<br/>
      User: sara@example.com / user123
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/auth.js"></script>
<script>
  // If already logged in, redirect
  const tok = localStorage.getItem('token');
  const usr = localStorage.getItem('user');
  if (tok && usr) {
    const u = JSON.parse(usr);
    window.location.href = u.role === 'admin' ? '/admin.html' : '/dashboard.html';
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn   = document.getElementById('loginBtn');
    const alert = document.getElementById('loginAlert');
    alert.classList.remove('show');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Signing in…';

    try {
      const res  = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email:    document.getElementById('loginEmail').value,
          password: document.getElementById('loginPassword').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Login failed');

      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify({ account_id: data.account_id, name: data.name, email: data.email, role: data.role, balance: data.balance }));

      window.location.href = data.role === 'admin' ? '/admin.html' : '/dashboard.html';
    } catch (err) {
      alert.textContent = err.message;
      alert.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
